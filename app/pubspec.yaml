name: clock_app
description: Ajanta OLC-501 Smart Clock controller app
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  multicast_dns: ^0.3.3
  shared_preferences: ^2.5.5
  provider: ^6.1.5
  cupertino_icons: ^1.0.9
  network_info_plus: ^7.0.0
  http: ^1.6.0
  file_selector: ^1.0.3
  geolocator: ^13.0.2
  flutter_timezone: ^4.1.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/world_places.txt
