; PlatformIO project for the Ajanta smart clock (Wemos D1 Mini / ESP8266)
;
; Why PlatformIO: the Arduino IDE 2.x serial-discovery daemon was resetting the
; board mid-flash. PlatformIO flashes from the CLI with no such daemon, and
; ships a modern esptool, so uploads are reliable.
;
; Usage (VS Code PlatformIO, or `pio run` in a terminal):
;   Build   : PlatformIO: Build   (checkmark)
;   Upload  : PlatformIO: Upload   (arrow)
;   Monitor : PlatformIO: Monitor  (plug)  -> serial @115200
;
; If an upload ever fails on the stub step, uncomment the upload_flags block
; below to use the ROM loader (--no-stub) which is the most robust path.

[env:d1_mini]
platform = espressif8266
board = d1_mini
framework = arduino

monitor_speed = 115200
upload_speed = 115200

; --- robust-flash fallback (uncomment if a normal upload fails) ---
; upload_resetmethod = nodemcu
; upload_flags =
;     --no-stub

; Libraries used by the full firmware (harmless for the test sketch)
lib_deps =
    knolleary/PubSubClient
    bblanchon/ArduinoJson
